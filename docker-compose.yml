services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: default1
      POSTGRES_DB: aggregator
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  news_fetcher:
    build:
      context: .
      dockerfile: news_fetcher/Dockerfile
    depends_on:
      - postgres
    command: sh -c "sleep 10 && python -m news_fetcher.fetch_and_store_articles"
    environment:
      DATABASE_URL: "postgresql://postgres:default1@postgres:5432/aggregator"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: default1
      POSTGRES_HOST: postgres
      POSTGRES_DB: aggregator
      NEWS_API_KEY: SuperSecretKey

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    command: sh -c "sleep 10 && python -m aggregator.app"
    environment:
      DATABASE_URL: "postgresql://postgres:default1@postgres:5432/aggregator"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: default1
      POSTGRES_HOST: postgres
      POSTGRES_DB: aggregator
      NEWS_API_KEY: SuperSecretKey
    volumes:
      - .:/app

networks:
  default:
    name: app-network
